name: Update Samsung stock data

on:
  schedule:
    # 평일 18:30 KST = 09:30 UTC. KRX 정규 장은 15:30 KST 마감이므로 마감 후 갱신.
    - cron: '30 9 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Update data.json
        run: python scripts/update_data.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "변경 사항 없음 — 커밋 생략"
          else
            git commit -m "auto: update Samsung stock price"
            git push
          fi
